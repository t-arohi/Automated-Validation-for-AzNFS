name: Scan Marketplace Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # Daily at 01:23 UTC.
    #
    # NOTE: deliberately NOT on the hour and NOT at midnight. GitHub's
    # `schedule` trigger is best-effort: at high-load times (every :00, and
    # 00:00 UTC most of all) queued cron runs are frequently delayed by many
    # minutes or dropped entirely. Picking an off-peak hour and an odd minute
    # makes the daily run fire reliably. If you need it at a different time,
    # keep the minute non-zero and avoid the top of popular hours.
    - cron: "30 10 * * *"
  workflow_dispatch:
    # Manual trigger from the GitHub Actions UI

jobs:
  scan:
    runs-on:
      - self-hosted
      - azure-vm-marketplace

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout source
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Restore the SQLite database from the previous run (if any).
      #    On the very first run there is no cache yet — that is fine;
      #    the script will create a fresh database automatically.
      # ----------------------------------------------------------------
      - name: Restore database cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: marketplace.db
          key: marketplace-db-v2-${{ github.run_id }}
          restore-keys: |
            marketplace-db-v2-

      # ----------------------------------------------------------------
      # 3. Python setup and dependency install
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run the scan.
      #    DefaultAzureCredential authenticates via the user-assigned
      #    Managed Identity attached to this self-hosted runner's VM.
      #    notifier.py uses the same MI to send the ACS email in-process,
      #    so no SMTP step is needed afterwards.
      #
      #    Exit code 1 means "new distro release(s) found" — not a
      #    failure. Anything > 1 is treated as a real failure.
      # ----------------------------------------------------------------
      - name: Run marketplace scan
        id: scan
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.AZURE_MANAGED_IDENTITY_CLIENT_ID }}
          ACS_ENDPOINT: ${{ vars.ACS_ENDPOINT }}
          ACS_SENDER: ${{ vars.ACS_SENDER }}
        run: |
          cd scripts
          set +e
          python scan_marketplace.py
          scan_exit=$?
          set -e
          echo "scan_exit=$scan_exit" >> "$GITHUB_OUTPUT"
          if [ "$scan_exit" -gt 1 ]; then
            exit "$scan_exit"
          fi
        continue-on-error: true

      # ----------------------------------------------------------------
      # 5. Render a Markdown summary into the Actions UI for quick review.
      # ----------------------------------------------------------------
      - name: Write step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os
          summary = os.environ["GITHUB_STEP_SUMMARY"]
          path = "output/needs_validation.json"
          try:
              images = json.load(open(path, encoding="utf-8"))
          except Exception:
              images = []
          with open(summary, "a", encoding="utf-8") as fh:
              if not images:
                  fh.write("## Marketplace scan: no new SKU image(s) flagged this run.\n")
              else:
                  fh.write(f"## {len(images)} new SKU image(s) flagged for validation\n\n")
                  fh.write("_New marketplace image rows discovered this run (per SKU). Phase 2 consumes `output/needs_validation.json`._\n\n")
                  fh.write("| Publisher | Distro Label | SKU | Version | Arch |\n")
                  fh.write("|---|---|---|---|---|\n")
                  for d in images:
                      fh.write(
                          f"| {d.get('publisher','')}"
                          f" | {d.get('distro_label','')}"
                          f" | {d.get('sku','')}"
                          f" | {d.get('version','')}"
                          f" | {d.get('architecture','')} |\n"
                      )
                  fh.write("\n_Email notification for **new** releases was sent in-process by `notifier.py` via ACS + Managed Identity._\n")
          EOF

      # ----------------------------------------------------------------
      # 6. Upload the JSON output as a workflow artifact (always, for audit)
      # ----------------------------------------------------------------
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-scan-${{ github.run_number }}
          path: |
            output/needs_validation.json
          retention-days: 30
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # 7. Save updated database to cache for the next run
      # ----------------------------------------------------------------
      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: marketplace.db
          key: marketplace-db-v2-${{ github.run_id }}
